name: CI

# When this workflow runs
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repository code into the runner
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Install the Python version your app uses
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run the test suite
      - name: Run tests
        env:
          FLASK_SECRET_KEY: ci-test-secret-key
        run: |
          pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    # Only run this job if the "test" job succeeded first
    needs: test

    steps:
      # 1. Check out the code
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Build the Docker image to confirm the Dockerfile is valid.
      #    We tag it locally; we are NOT pushing it anywhere yet.
      - name: Build Docker image
        run: |
          docker build -t financecs330:ci .