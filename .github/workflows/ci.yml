name: CI

# When this workflow runs
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repository code into the runner
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Install the Python version your app uses
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Install dependencies (cached pip speeds up future runs)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run the test suite
      #    FLASK_SECRET_KEY is provided so app.py imports without crashing,
      #    even though tests override it with their own test secret.
      - name: Run tests
        env:
          FLASK_SECRET_KEY: ci-test-secret-key
        run: |
          pytest tests/ -v